<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PDF Converter Web</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell shell-user">
      <section class="hero" id="buyer-hero">
        <p class="eyebrow">文件转换工具</p>
        <h1>Word 转 PDF、PDF 转 Word、PDF 转图片、图片转 PDF、PDF 合并、PDF 压缩、提取页面、拆分 PDF。</h1>
        <p class="hero-copy">
          输入卡密后即可使用 Word 转 PDF、PDF 转 Word、PDF 转图片、图片转 PDF、PDF 合并、PDF 压缩、PDF 提取页面和拆分 PDF。
        </p>
      </section>

      <section class="panel" id="buyer-login-panel">
        <div class="panel-header">
          <h2>买家登录</h2>
          <p>请输入卖家提供的卡密。</p>
        </div>
        <form id="buyer-login-form" class="stack">
          <label class="field">
            <span>卡密</span>
            <input id="buyer-code" name="code" type="text" placeholder="例如：DEMO-USES-5" required />
          </label>
          <button class="button" type="submit">进入功能页</button>
        </form>
        <p class="message" id="buyer-message"></p>
      </section>

      <section class="panel hidden" id="buyer-dashboard">
        <div class="panel-header" id="buyer-dashboard-header">
          <div>
            <h2 id="dashboard-title">选择转换方式</h2>
            <p id="dashboard-copy">先选择一种方法，再进入详情页上传文件和填写参数。</p>
          </div>
        </div>
        <div class="tool-grid" id="conversion-overview"></div>
        <div class="hidden" id="conversion-detail"></div>
        <p class="message" id="conversion-message"></p>
      </section>
    </main>

    <script type="module" src="/app.js"></script>
  </body>
  </html>
