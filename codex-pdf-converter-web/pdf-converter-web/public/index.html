<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PP 工具站</title>
    <link rel="stylesheet" href="/vendor/font-awesome/css/font-awesome.min.css" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="buyer-app">
      <section class="login-shell" id="buyer-login-panel">
        <div class="login-brand">
          <div class="login-brand-mark" aria-hidden="true">PP</div>
          <div class="login-brand-copy">
            <strong>PP 工具站</strong>
            <span>买家登录后即可使用全部已开通工具</span>
          </div>
        </div>
        <section class="login-panel">
          <div class="login-panel-copy">
            <p class="login-kicker">工具登录</p>
            <h1>输入卡密后进入工具页</h1>
            <p>请输入卖家提供的卡密，登录后即可使用当前已实现的在线文件处理工具。</p>
          </div>
          <form id="buyer-login-form" class="stack">
            <label class="field">
              <span>卡密</span>
              <input id="buyer-code" name="code" type="text" placeholder="例如：DEMO-DAYS-7" required />
            </label>
            <button class="button" type="submit">进入工具页</button>
          </form>
          <p class="message" id="buyer-message"></p>
        </section>
      </section>

      <section class="hidden" id="buyer-dashboard"></section>
    </main>

    <script type="module" src="/app.js"></script>
  </body>
  </html>
